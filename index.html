<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kalkulator BMI</title>
  <style>
    :root {
      --bg1: #9a6a00;
      --bg2: #f0b400;
      --bg3: #ffe58a;
      --panel: rgba(255,255,255,0.92);
      --panel-soft: rgba(255,255,255,0.16);
      --text: #5b4200;
      --text-soft: #8d6a00;
      --line: rgba(255,255,255,0.28);
      --accent: #ffb300;
      --accent-dark: #c88700;
      --shadow: 0 18px 50px rgba(90, 58, 0, 0.26);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.2), transparent 30%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 48%, var(--bg3) 100%);
      color: white;
    }

    body {
      padding: max(16px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom)) 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app {
      width: 100%;
      max-width: 480px;
    }

    .hero {
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 32px;
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .hero-top {
      padding: 22px 22px 18px;
      background: linear-gradient(180deg, rgba(116, 80, 0, 0.92), rgba(232, 170, 0, 0.75));
      border-bottom: 1px solid rgba(255,255,255,0.16);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.16);
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .brand-badge .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: linear-gradient(180deg, #fff3a5, #ffcf33);
      box-shadow: 0 0 14px rgba(255, 240, 160, 0.85);
    }

    .hero-top h1 {
      margin: 14px 0 6px;
      font-size: 1.95rem;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .hero-top p {
      margin: 0;
      color: rgba(255,255,255,0.9);
      font-size: 0.98rem;
    }

    .result-card {
      margin: 18px 22px 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,248,220,0.95));
      border-radius: 28px;
      padding: 18px 20px 20px;
      color: var(--text);
      box-shadow: 0 12px 28px rgba(120, 83, 0, 0.18);
    }

    .result-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .result-top .label, .result-top .category {
      font-size: 0.9rem;
      color: var(--text-soft);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .result-value {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .result-number {
      font-size: clamp(3rem, 12vw, 4.8rem);
      line-height: 0.95;
      font-weight: 800;
      color: #f0a500;
      letter-spacing: -0.05em;
    }

    .result-unit {
      padding: 7px 12px;
      border-radius: 999px;
      background: #5f4a17;
      color: white;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .hero-body {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .dial-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 28px;
      padding: 20px 18px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .dial-title {
      text-align: center;
      font-weight: 700;
      color: white;
      font-size: 1.08rem;
    }

    .dial-subtitle {
      color: rgba(255,255,255,0.78);
      font-size: 0.92rem;
      margin-top: -4px;
    }

    .dial {
      width: min(76vw, 260px);
      height: min(76vw, 260px);
      max-width: 260px;
      max-height: 260px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.88);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.12), rgba(255,255,255,0.03) 62%, rgba(255,255,255,0.01) 100%);
      --indicator-angle: 0deg;
    }

    .dial-indicator {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      pointer-events: none;
      transform: rotate(var(--indicator-angle));
      transition: transform 0.22s ease;
    }

    .dial-indicator::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -8px;
      transform: translateX(-50%);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 0 0 6px rgba(255,255,255,0.14), 0 4px 12px rgba(90, 58, 0, 0.26);
    }

    .dial-controls {
      width: 100%;
      display: grid;
      grid-template-columns: 56px 1fr 56px;
      align-items: center;
      gap: 10px;
    }

    .step-btn {
      width: 56px;
      height: 56px;
      border: 0;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,244,210,0.95));
      color: var(--accent-dark);
      font-size: 2rem;
      line-height: 1;
      font-weight: 500;
      box-shadow: 0 10px 22px rgba(90, 58, 0, 0.2);
      cursor: pointer;
    }

    .dial-center {
      text-align: center;
      min-width: 0;
    }

    .dial-value {
      font-size: clamp(2.45rem, 10vw, 3.8rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: white;
    }

    .dial-unit {
      margin-top: 8px;
      font-size: 1rem;
      color: rgba(255,255,255,0.88);
      font-weight: 600;
    }

    .slider-wrap {
      width: 100%;
      margin-top: 6px;
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.26);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 0;
      background: white;
      box-shadow: 0 4px 12px rgba(90, 58, 0, 0.3);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 0;
      background: white;
      box-shadow: 0 4px 12px rgba(90, 58, 0, 0.3);
      cursor: pointer;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
      width: 100%;
    }

    .chip {
      border: 1px solid rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.12);
      color: white;
      border-radius: 999px;
      padding: 9px 8px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .chip.active {
      background: white;
      color: var(--accent-dark);
      border-color: white;
    }

    .details {
      margin-top: 6px;
      background: rgba(255,255,255,0.9);
      color: var(--text);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 12px 28px rgba(120, 83, 0, 0.14);
    }

    .details-grid {
      display: grid;
      gap: 12px;
    }

    .detail-box {
      border-radius: 16px;
      background: #fff7df;
      padding: 14px;
    }

    .detail-box .k {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #8d6a00;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .detail-box .v {
      font-size: 1rem;
      font-weight: 800;
      color: #6b4d00;
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      color: rgba(255,255,255,0.88);
      font-size: 0.86rem;
      padding-bottom: 8px;
    }

    @media (min-width: 860px) {
      .app { max-width: 920px; }
      .hero-body { grid-template-columns: 1fr 1fr; }
      .details-grid { grid-template-columns: repeat(3, 1fr); }
      .dial { width: 240px; height: 240px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="hero-top">
        <div class="brand">
          <div class="brand-badge">
            <span class="dot"></span>
            BMI / Body Mass Index
          </div>
          <div style="font-weight:700; opacity:0.9;">MICHAA</div>
        </div>
        <h1>Kalkulator BMI</h1>
        <p>Podaj wzrost i masę ciała. Wynik BMI pojawia się od razu na górze.</p>
      </div>

      <div class="result-card">
        <div class="result-top">
          <div class="label">Wynik BMI</div>
          <div class="category" id="bmiCategory">Prawidłowe</div>
        </div>
        <div class="result-value">
          <div class="result-number" id="bmiOutput">24.22</div>
          <div class="result-unit">BMI</div>
        </div>
      </div>

      <div class="hero-body">
        <div>
          <div class="dial-card">
            <div class="dial-title">Wzrost</div>
            <div class="dial-subtitle">m</div>
            <div class="dial" id="heightDial">
              <div class="dial-indicator"></div>
              <div class="dial-controls">
                <button class="step-btn" id="heightMinus" type="button">−</button>
                <div class="dial-center">
                  <div class="dial-value" id="heightValue">1.70</div>
                  <div class="dial-unit">m</div>
                </div>
                <button class="step-btn" id="heightPlus" type="button">+</button>
              </div>
            </div>
            <div class="slider-wrap">
              <input id="heightRange" type="range" min="1.40" max="2.10" step="0.01" value="1.70" />
            </div>
            <div class="quick-grid" id="quickHeight"></div>
          </div>
        </div>

        <div>
          <div class="dial-card">
            <div class="dial-title">Masa ciała</div>
            <div class="dial-subtitle">kg</div>
            <div class="dial" id="weightDial">
              <div class="dial-indicator"></div>
              <div class="dial-controls">
                <button class="step-btn" id="weightMinus" type="button">−</button>
                <div class="dial-center">
                  <div class="dial-value" id="weightValue">70</div>
                  <div class="dial-unit">kg</div>
                </div>
                <button class="step-btn" id="weightPlus" type="button">+</button>
              </div>
            </div>
            <div class="slider-wrap">
              <input id="weightRange" type="range" min="30" max="180" step="1" value="70" />
            </div>
            <div class="quick-grid" id="quickWeight"></div>
          </div>
        </div>
      </div>

      <div style="padding: 0 22px 22px;">
        <section class="details">
          <div class="details-grid">
            <div class="detail-box">
              <span class="k">Wzór</span>
              <span class="v">BMI = kg / (m²)</span>
            </div>
            <div class="detail-box">
              <span class="k">Masa</span>
              <span class="v" id="weightInfo">70 kg</span>
            </div>
            <div class="detail-box">
              <span class="k">Wzrost</span>
              <span class="v" id="heightInfo">1.70 m</span>
            </div>
          </div>
        </section>
      </div>
    </section>

    <div class="footer">Kalkulator BMI / © MICHAA 2026</div>
  </main>

  <script>
    const heightRange = document.getElementById('heightRange');
    const weightRange = document.getElementById('weightRange');
    const heightValue = document.getElementById('heightValue');
    const weightValue = document.getElementById('weightValue');
    const bmiOutput = document.getElementById('bmiOutput');
    const bmiCategory = document.getElementById('bmiCategory');
    const weightInfo = document.getElementById('weightInfo');
    const heightInfo = document.getElementById('heightInfo');
    const heightDial = document.getElementById('heightDial');
    const weightDial = document.getElementById('weightDial');
    const quickHeightWrap = document.getElementById('quickHeight');
    const quickWeightWrap = document.getElementById('quickWeight');

    const heightSteps = [1.5, 1.6, 1.7, 1.8, 1.9];
    const weightSteps = [40, 50, 60, 70, 80, 90, 100, 120, 140];

    heightSteps.forEach((step) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chip';
      btn.textContent = `${step.toFixed(1)} m`;
      btn.addEventListener('click', () => {
        heightRange.value = step.toFixed(2);
        update();
      });
      quickHeightWrap.appendChild(btn);
    });

    weightSteps.forEach((step) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chip';
      btn.textContent = `${step} kg`;
      btn.addEventListener('click', () => {
        weightRange.value = step;
        update();
      });
      quickWeightWrap.appendChild(btn);
    });

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function setHeight(next) {
      const value = clamp(next, 1.40, 2.10);
      heightRange.value = value.toFixed(2);
      update();
    }

    function setWeight(next) {
      weightRange.value = clamp(next, 30, 180);
      update();
    }

    document.getElementById('heightMinus').addEventListener('click', () => setHeight(Number(heightRange.value) - 0.01));
    document.getElementById('heightPlus').addEventListener('click', () => setHeight(Number(heightRange.value) + 0.01));
    document.getElementById('weightMinus').addEventListener('click', () => setWeight(Number(weightRange.value) - 1));
    document.getElementById('weightPlus').addEventListener('click', () => setWeight(Number(weightRange.value) + 1));

    heightRange.addEventListener('input', update);
    weightRange.addEventListener('input', update);

    function update() {
      const height = Number(heightRange.value);
      const weight = Number(weightRange.value);
      const bmi = weight / (height * height);

      const heightMin = Number(heightRange.min);
      const heightMax = Number(heightRange.max);
      const weightMin = Number(weightRange.min);
      const weightMax = Number(weightRange.max);

      const heightCenter = 1.7;
      const weightCenter = 70;

      let heightAngle = 0;
      if (height >= heightCenter) {
        heightAngle = ((height - heightCenter) / (heightMax - heightCenter)) * 135;
      } else {
        heightAngle = -((heightCenter - height) / (heightCenter - heightMin)) * 135;
      }

      let weightAngle = 0;
      if (weight >= weightCenter) {
        weightAngle = ((weight - weightCenter) / (weightMax - weightCenter)) * 135;
      } else {
        weightAngle = -((weightCenter - weight) / (weightCenter - weightMin)) * 135;
      }

      heightDial.style.setProperty('--indicator-angle', `${heightAngle}deg`);
      weightDial.style.setProperty('--indicator-angle', `${weightAngle}deg`);

      let category = 'Prawidłowe';
      if (bmi < 18.5) category = 'Niedowaga';
      else if (bmi < 25) category = 'Prawidłowe';
      else if (bmi < 30) category = 'Nadwaga';
      else category = 'Otyłość';

      heightValue.textContent = height.toFixed(2);
      weightValue.textContent = weight.toFixed(0);
      bmiOutput.textContent = bmi.toFixed(2);
      bmiCategory.textContent = category;
      weightInfo.textContent = `${weight.toFixed(0)} kg`;
      heightInfo.textContent = `${height.toFixed(2)} m`;

      [...quickHeightWrap.children].forEach((el) => {
        el.classList.toggle('active', Math.abs(Number(el.textContent.replace(' m', '')) - height) < 0.001);
      });

      [...quickWeightWrap.children].forEach((el) => {
        el.classList.toggle('active', Number(el.textContent.replace(' kg', '')) === weight);
      });
    }

    update();
  </script>
</body>
</html>
